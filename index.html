<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kas Konjoy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#4f46e5,#0ea5e9);
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:450px;
height:450px;
background:rgba(255,255,255,.08);
border-radius:50%;
top:-150px;
right:-150px;
}

body::after{
content:"";
position:absolute;
width:350px;
height:350px;
background:rgba(255,255,255,.05);
border-radius:50%;
bottom:-120px;
left:-120px;
}

.card{
position:relative;
z-index:10;
width:420px;
max-width:90%;
padding:45px;
border-radius:28px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(18px);
box-shadow:0 20px 60px rgba(0,0,0,.25);
text-align:center;
color:white;
}

.logo{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
animation:float 2s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

h1{
margin-top:22px;
font-size:34px;
font-weight:700;
}

p{
margin-top:12px;
opacity:.9;
line-height:1.8;
}

.loader{
margin:35px auto 20px;
width:100%;
height:10px;
background:rgba(255,255,255,.25);
border-radius:100px;
overflow:hidden;
}

.progress{
height:100%;
background:white;
width:0;
animation:loading 3s linear forwards;
}

@keyframes loading{
100%{
width:100%;
}
}

.small{
font-size:14px;
opacity:.8;
margin-top:20px;
}

</style>

<script>
setTimeout(function () {
    window.location.replace("https://script.google.com/macros/s/AKfycbzbw0pMdeLaD4o1ZZrsHNrvT5c8AvIIMShkwJpiET3aXTQTqW05gz6sUnjAJo2sPqUmvw/exec");
},3000);
</script>

</head>

<body>

<div class="card">

<div class="logo">
💰
</div>

<h1>Kas Konjoy</h1>

<p>
Sistem pencatatan kas komunitas.<br>
Data tersimpan aman di cloud dan dapat diakses kapan saja.
</p>

<div class="loader">
<div class="progress"></div>
</div>

<div class="small">
Sedang membuka aplikasi...
</div>

</div>

</body>
</html>
