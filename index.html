<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas Konjoy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:linear-gradient(135deg,#0f62fe,#4589ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.card{

background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.25);
max-width:450px;
width:90%;

}

.logo{

font-size:70px;

}

h1{

margin:20px 0;
color:#0f62fe;

}

p{

color:#666;
line-height:1.7;

}

.btn{

display:inline-block;
margin-top:30px;
padding:15px 35px;
background:#0f62fe;
color:white;
text-decoration:none;
font-size:18px;
border-radius:12px;
transition:.3s;

}

.btn:hover{

background:#0043ce;
transform:scale(1.05);

}

.footer{

margin-top:25px;
font-size:13px;
color:#999;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">💰</div>

<h1>Kas Konjoy</h1>

<p>

Selamat datang di aplikasi pencatatan kas komunitas Konjoy.

Silakan klik tombol di bawah untuk masuk ke aplikasi.

</p>

<a class="btn"
href="https://script.google.com/macros/s/AKfycbzbw0pMdeLaD4o1ZZrsHNrvT5c8AvIIMShkwJpiET3aXTQTqW05gz6sUnjAJo2sPqUmvw/exec">

Masuk ke Aplikasi

</a>

<div class="footer">

© 2026 Kas Konjoy

</div>

</div>

</body>
</html>
